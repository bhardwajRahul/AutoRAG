name: Publish Legacy Python 🐍 distributions 📦 to PyPI
permissions:
  contents: read

# Legacy AutoRAG (Python) releases are tagged as legacy-v* (e.g. legacy-v0.3.10).
# The v* tags are reserved for AutoRAG 2.0 npm releases (see release.yml).
on:
  push:
    tags: ["legacy-v*"]

jobs:
  set-version:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Export tag
        id: vars
        run: echo tag=${GITHUB_REF#refs/tags/legacy-} >> $GITHUB_OUTPUT

      - name: Update project version
        run: |
          sed -i "s/^version = \".*\"/version = \"$RELEASE_VERSION\"/" legacy/pyproject.toml
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.tag }}

      - name: Upload updated pyproject.toml
        uses: actions/upload-artifact@v4
        with:
          name: pyproject-toml
          path: legacy/pyproject.toml

  publish:
    runs-on: ubuntu-latest
    needs: [set-version]
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: 'true'
          cache-suffix: '3.11'
      - name: Download updated pyproject.toml
        uses: actions/download-artifact@v4
        with:
          name: pyproject-toml
          path: legacy
      - name: Install Python dependencies
        run: uv sync --frozen --all-extras
        working-directory: legacy
        shell: bash

      - name: Build package
        run: uv build
        working-directory: legacy

      - name: Publish package
        run: uv publish
        working-directory: legacy
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
